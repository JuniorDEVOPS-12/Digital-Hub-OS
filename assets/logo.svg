<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Orange square before Digital -->
  <rect x="0" y="18" width="12" height="12" fill="#f97316" rx="2"/>
  
  <!-- Digital text in dark blue -->
  <text x="18" y="30" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#1a365d">Digital</text>
  
  <!-- HUB in white inside orange rectangle -->
  <rect x="85" y="12" width="50" height="28" fill="#f97316" rx="4"/>
  <text x="110" y="30" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">HUB</text>
</svg>
